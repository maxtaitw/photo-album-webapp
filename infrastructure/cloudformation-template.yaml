AWSTemplateFormatVersion: "2010-09-09"
Description: Minimal Assignment 3 infrastructure stack for submission.

Parameters:
  FrontendBucketName:
    Type: String
    Description: Globally unique bucket name for the static frontend website.

  PhotoBucketName:
    Type: String
    Description: Globally unique bucket name for uploaded photos.

  ProjectPrefix:
    Type: String
    Default: photo-album-demo
    Description: Prefix for resource names created by this stack.

Resources:
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref FrontendBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: PublicReadFrontend
            Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub arn:${AWS::Partition}:s3:::${FrontendBucketName}/*

  PhotoBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref PhotoBucketName
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - GET
              - HEAD
              - PUT
            AllowedOrigins:
              - "*"
            MaxAge: 3000

  IndexPhotosRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  SearchPhotosRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  IndexPhotosFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Timeout: 30
      Role: !GetAtt IndexPhotosRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
              return {
                  "statusCode": 200,
                  "body": "index-photos placeholder from CloudFormation"
              }

  SearchPhotosFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Timeout: 15
      Role: !GetAtt SearchPhotosRole.Arn
      Code:
        ZipFile: |
          import json

          def handler(event, context):
              return {
                  "statusCode": 200,
                  "headers": {"Content-Type": "application/json"},
                  "body": json.dumps({"message": "search-photos placeholder from CloudFormation"})
              }

  PhotoAlbumApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub ${ProjectPrefix}-api

Outputs:
  FrontendBucketName:
    Value: !Ref FrontendBucket

  FrontendWebsiteUrl:
    Value: !GetAtt FrontendBucket.WebsiteURL

  PhotoBucketName:
    Value: !Ref PhotoBucket

  IndexPhotosFunctionName:
    Value: !Ref IndexPhotosFunction

  SearchPhotosFunctionName:
    Value: !Ref SearchPhotosFunction

  ApiId:
    Value: !Ref PhotoAlbumApi
